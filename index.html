<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Signage Display</title>
    <!-- Cache busting requirements -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="styles.css?v=m9p3k2">
</head>
<body>
    <div class="canvas-container">
        <!-- Displaying the provided image as digital signage -->
        <div class="image-wrapper">
            <img src="https://skoop-general.s3.us-east-1.amazonaws.com/1773488667863-image.png" alt="Digital Signage Content" class="signage-asset">
        </div>
    </div>
    <script src="script.js?v=m9p3k2"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
